name: Pipeline Big Data Completo (EA1, EA2, EA3)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 * *' # Se ejecuta el día 1 de cada mes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl
        pip install .

    - name: Fase 1 - Ejecutar script de Ingesta (EA1)
      run: python src/ingestion.py

    - name: Fase 2 - Ejecutar script de Limpieza (EA2)
      run: python src/cleaning.py

    - name: Fase 3 - Ejecutar script de Enriquecimiento (EA3)
      run: python src/enrichment.py

    - name: Subir artefactos (Evidencias finales)
      uses: actions/upload-artifact@v4
      with:
        name: evidencias-proyecto-final
        path: |
          src/db/
          src/data/
          src/static/auditoria/
          src/xlsx/